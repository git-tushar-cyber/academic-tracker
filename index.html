
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;
--txt:#1a1a1a;--txt2:#6b6b6b;--txt3:#aaa;
--bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
--info-bg:#e6f1fb;--info-txt:#185fa5;
--warn-bg:#faeeda;--warn-txt:#854f0b;
--ok-bg:#eaf3de;--ok-txt:#3b6d11;
--danger-bg:#fcebeb;--danger-txt:#a32d2d;
--pink-bg:#fbeaf0;--pink-txt:#993556;
--purple-bg:#eeedfe;--purple-txt:#534ab7;
--r:8px;--rl:12px;
}
.dark{
--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333330;
--txt:#f0ede8;--txt2:#a0a09a;--txt3:#66666a;
--bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2);
--info-bg:#0c2a44;--info-txt:#85b7eb;
--warn-bg:#3a2200;--warn-txt:#fac775;
--ok-bg:#172404;--ok-txt:#97c459;
--danger-bg:#2d1010;--danger-txt:#f09595;
--pink-bg:#2d0f1a;--pink-txt:#ed93b1;
--purple-bg:#1a1840;--purple-txt:#afa9ec;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--txt);min-height:100vh;transition:background 0.2s,color 0.2s;}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;}
.top-row h1{font-size:20px;font-weight:500;color:var(--txt);}
.top-row .sub{font-size:12px;color:var(--txt2);margin-top:3px;}
.dark-btn{border:0.5px solid var(--bdr2);background:transparent;color:var(--txt2);border-radius:var(--r);padding:5px 12px;font-size:12px;cursor:pointer;}
.dark-btn:hover{background:var(--bg3);}

.deadline-bar{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.days-num{font-size:26px;font-weight:500;color:#D85A30;}
.days-lbl{font-size:12px;color:var(--txt2);}
.prog-wrap{flex:1;min-width:160px;}
.prog-head{display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);margin-bottom:6px;}
.prog-track{background:var(--bdr);border-radius:4px;height:8px;overflow:hidden;}
.prog-fill{background:#1D9E75;height:100%;border-radius:4px;transition:width 0.4s;}

.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:1.25rem;}
.stat{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r);padding:0.65rem;text-align:center;}
.stat .num{font-size:20px;font-weight:500;}
.stat .lbl{font-size:10px;color:var(--txt2);margin-top:2px;}

.urgent-box{background:var(--danger-bg);border:0.5px solid var(--danger-txt);border-radius:var(--rl);padding:0.85rem 1.1rem;margin-bottom:1.25rem;}
.urgent-title{font-size:13px;font-weight:500;color:var(--danger-txt);margin-bottom:8px;}
.urgent-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(163,45,45,0.15);}
.urgent-item:last-child{border-bottom:none;}
.urgent-item span{font-size:12px;color:var(--danger-txt);flex:1;}
.urgent-item .u-subj{font-size:11px;color:var(--txt2);}

.planner-box{background:var(--info-bg);border:0.5px solid var(--info-txt);border-radius:var(--rl);padding:0.85rem 1.1rem;margin-bottom:1.25rem;}
.planner-title{font-size:13px;font-weight:500;color:var(--info-txt);margin-bottom:6px;}
.planner-row{display:flex;gap:8px;flex-wrap:wrap;}
.planner-chip{background:var(--bg);border:0.5px solid var(--bdr2);border-radius:var(--r);padding:4px 10px;font-size:12px;color:var(--txt);}
.planner-chip span{color:var(--info-txt);font-weight:500;}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.fbtn{border:0.5px solid var(--bdr2);border-radius:var(--r);background:transparent;padding:4px 10px;font-size:12px;color:var(--txt2);cursor:pointer;}
.fbtn.active{background:var(--info-bg);color:var(--info-txt);border-color:var(--info-txt);}

.block{border:0.5px solid var(--bdr);border-radius:var(--rl);background:var(--bg);margin-bottom:0.85rem;overflow:hidden;}
.block-header{padding:0.8rem 1rem;display:flex;align-items:center;gap:8px;cursor:pointer;}
.block-header:hover{background:var(--bg2);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sname{font-size:13px;font-weight:500;flex:1;color:var(--txt);}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--r);}
.badge-lab{background:var(--warn-bg);color:var(--warn-txt);}
.badge-theory{background:var(--info-bg);color:var(--info-txt);}
.sprog{font-size:11px;color:var(--txt2);}
.subj-bar-wrap{width:60px;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;flex-shrink:0;}
.subj-bar-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.3s;}
.arrow{font-size:10px;color:var(--txt3);transition:transform 0.2s;}

.tasks{padding:0.4rem 1rem 0.6rem;border-top:0.5px solid var(--bdr);}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bdr);}
.task-row:last-child{border-bottom:none;}
.task-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;flex-shrink:0;margin-top:2px;accent-color:#1D9E75;}
.task-main{flex:1;display:flex;flex-direction:column;gap:3px;}
.task-lbl{font-size:13px;color:var(--txt);}
.task-lbl.done{text-decoration:line-through;color:var(--txt3);}
.task-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.task-note{font-size:11px;color:var(--txt2);font-style:italic;}
.ttype{font-size:10px;padding:2px 6px;border-radius:var(--r);flex-shrink:0;}
.t-assign{background:var(--info-bg);color:var(--info-txt);}
.t-project{background:var(--purple-bg);color:var(--purple-txt);}
.t-lab{background:var(--warn-bg);color:var(--warn-txt);}
.t-online{background:var(--ok-bg);color:var(--ok-txt);}
.t-activity{background:var(--pink-bg);color:var(--pink-txt);}
.t-defaulter{background:var(--danger-bg);color:var(--danger-txt);}
.pri{font-size:10px;padding:2px 6px;border-radius:var(--r);flex-shrink:0;}
.pri-high{background:#fcebeb;color:#a32d2d;}
.pri-medium{background:#faeeda;color:#854f0b;}
.pri-low{background:#eaf3de;color:#3b6d11;}
.dark .pri-high{background:#2d1010;color:#f09595;}
.dark .pri-medium{background:#3a2200;color:#fac775;}
.dark .pri-low{background:#172404;color:#97c459;}
.due-tag{font-size:10px;color:var(--txt2);}
.del-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt3);padding:0 2px;flex-shrink:0;margin-top:2px;}
.del-btn:hover{color:var(--danger-txt);}

.add-row{display:flex;gap:5px;padding:0.5rem 1rem 0.6rem;flex-wrap:wrap;align-items:center;border-top:0.5px solid var(--bdr);}
.add-row input,.add-row select{border:0.5px solid var(--bdr2);border-radius:var(--r);padding:4px 7px;font-size:12px;background:var(--bg);color:var(--txt);}
.add-row input[type=text]{flex:1;min-width:100px;}
.add-row input[type=date]{font-size:11px;}
.add-row input[type=text].note-inp{font-size:11px;min-width:80px;max-width:140px;}
.add-btn{border:0.5px solid var(--bdr2);background:transparent;color:var(--txt);border-radius:var(--r);padding:4px 10px;font-size:12px;cursor:pointer;}
.add-btn:hover{background:var(--bg2);}
.empty{font-size:12px;color:var(--txt3);padding:0.6rem 0;text-align:center;}
.collapsed .tasks,.collapsed .add-row{display:none;}
.collapsed .arrow{transform:rotate(-90deg);}

.export-row{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.exp-btn{border:0.5px solid var(--bdr2);background:transparent;color:var(--txt2);border-radius:var(--r);padding:5px 14px;font-size:12px;cursor:pointer;}
.exp-btn:hover{background:var(--bg3);}
@media(max-width:500px){.stats{grid-template-columns:repeat(3,minmax(0,1fr));}.add-row input[type=date],.add-row input.note-inp{display:none;}}
</style>

<div id="root" class="wrap"></div>

<script>
const SUBJECTS=[
  {id:'elec',name:'Electronics for Cyber & Digital Science',color:'#378ADD',hasLab:true},
  {id:'eth', name:'Ethical Hacking II',color:'#534AB7',hasLab:true},
  {id:'db',  name:'Database Systems',color:'#1D9E75',hasLab:false},
  {id:'aiml',name:'AIML - Data Visualization using Python',color:'#D85A30',hasLab:true},
  {id:'sans',name:'Sanskrit II',color:'#888780',hasLab:false},
  {id:'coco',name:'Co-Curricular Course',color:'#BA7517',hasLab:false},
  {id:'ethai',name:'Ethics of AI',color:'#3C3489',hasLab:false},
  {id:'cep', name:'Community Engagement Program',color:'#0F6E56',hasLab:false},
  {id:'cert',name:'Certificate Course',color:'#993C1D',hasLab:false},
  {id:'plac',name:'Placement',color:'#3B6D11',hasLab:false},
];
const TYPES=['Assignment','Project','Lab Book','Online Course','Activity','Defaulter'];
const TCLASS={Assignment:'t-assign',Project:'t-project','Lab Book':'t-lab','Online Course':'t-online',Activity:'t-activity',Defaulter:'t-defaulter'};
const PRIS=['High','Medium','Low'];

let tasks=JSON.parse(localStorage.getItem('acad_tasks3')||'[]');
let nid=parseInt(localStorage.getItem('acad_nid3')||'1');
let filter='all';
let collapsed={};
let dark=localStorage.getItem('acad_dark')==='1';

function save(){localStorage.setItem('acad_tasks3',JSON.stringify(tasks));localStorage.setItem('acad_nid3',String(nid));}

function daysLeft(){return Math.max(0,Math.ceil((new Date('2026-04-11')-new Date())/86400000));}

function addTask(sid,name,type,pri,due,note){
  if(!name.trim())return;
  tasks.push({id:nid++,sid,name:name.trim(),type,pri,due,note:note.trim(),done:false});
  save();render();
}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();render();}}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save();render();}
function doAdd(sid){
  const n=document.getElementById('inp-'+sid);
  const ty=document.getElementById('sel-ty-'+sid);
  const pr=document.getElementById('sel-pr-'+sid);
  const du=document.getElementById('inp-du-'+sid);
  const no=document.getElementById('inp-no-'+sid);
  addTask(sid,n.value,ty.value,pr.value,du?du.value:'',no?no.value:'');
  n.value='';if(no)no.value='';
}
function exportJSON(){
  const blob=new Blob([JSON.stringify({tasks,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='academic_tasks_backup.json';a.click();
}
function exportCSV(){
  const rows=[['ID','Subject','Task','Type','Priority','Due','Note','Done']];
  tasks.forEach(t=>{
    const s=SUBJECTS.find(s=>s.id===t.sid);
    rows.push([t.id,s?s.name:'',t.name,t.type,t.pri||'',t.due||'',t.note||'',t.done?'Yes':'No']);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='academic_tasks.csv';a.click();
}
function toggleDark(){dark=!dark;localStorage.setItem('acad_dark',dark?'1':'0');render();}

function getDailyPlan(){
  const dl=daysLeft();
  const pending=tasks.filter(t=>!t.done).length;
  if(!pending||!dl)return null;
  return {perDay:Math.ceil(pending/dl),pending,dl};
}

function getUrgent(){
  return tasks.filter(t=>!t.done&&(t.type==='Defaulter'||t.pri==='High')).slice(0,5);
}

function render(){
  const el=document.getElementById('root');
  document.body.classList.toggle('dark',dark);

  const dl=daysLeft();
  const total=tasks.length,done=tasks.filter(t=>t.done).length,pending=total-done;
  const pct=total?Math.round(done/total*100):0;
  const defCount=tasks.filter(t=>t.type==='Defaulter'&&!t.done).length;
  const plan=getDailyPlan();
  const urgent=getUrgent();

  const filteredSubjs=SUBJECTS.map(s=>({
    ...s,
    subjTasks:tasks.filter(t=>t.sid===s.id&&(filter==='all'||t.type===filter)),
    allTasks:tasks.filter(t=>t.sid===s.id),
  }));

  el.innerHTML=`
<div class="top-row">
  <div><h1>Academic workload tracker</h1><div class="sub">Deadline: 11 April 2026</div></div>
  <button class="dark-btn" onclick="toggleDark()">${dark?'Light mode':'Dark mode'}</button>
</div>

<div class="deadline-bar">
  <div><div class="days-num">${dl}</div><div class="days-lbl">days remaining</div></div>
  <div class="prog-wrap">
    <div class="prog-head"><span>Overall completion</span><span>${pct}%</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="num">${total}</div><div class="lbl">Total</div></div>
  <div class="stat"><div class="num" style="color:#1D9E75">${done}</div><div class="lbl">Done</div></div>
  <div class="stat"><div class="num" style="color:#D85A30">${pending}</div><div class="lbl">Pending</div></div>
  <div class="stat"><div class="num" style="color:#A32D2D">${defCount}</div><div class="lbl">Defaulter</div></div>
  <div class="stat"><div class="num" style="color:#185fa5">${pct}%</div><div class="lbl">Complete</div></div>
</div>

${urgent.length?`
<div class="urgent-box">
  <div class="urgent-title">Urgent — do these first</div>
  ${urgent.map(t=>{
    const s=SUBJECTS.find(s=>s.id===t.sid);
    return `<div class="urgent-item">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" style="accent-color:#a32d2d;" />
      <span>${t.name}</span>
      <span class="u-subj">${s?s.name.split(' ')[0]:''}</span>
      <span class="ttype ${TCLASS[t.type]||'t-assign'}" style="font-size:10px;">${t.type}</span>
    </div>`;}).join('')}
</div>`:''}

${plan?`
<div class="planner-box">
  <div class="planner-title">Daily study plan</div>
  <div class="planner-row">
    <div class="planner-chip">${plan.pending} tasks left</div>
    <div class="planner-chip">${plan.dl} days to go</div>
    <div class="planner-chip">Do <span>${plan.perDay}</span> task${plan.perDay>1?'s':''} per day to finish on time</div>
  </div>
</div>`:''}

<div class="filters">
  ${['all','Assignment','Project','Lab Book','Online Course','Activity','Defaulter'].map(f=>`
    <button class="fbtn${filter===f?' active':''}" onclick="setFilter('${f}',this)">${f==='all'?'All':f+'s'}</button>
  `).join('')}
</div>

${filteredSubjs.map(s=>{
  const subjDone=s.allTasks.filter(t=>t.done).length;
  const subjTotal=s.allTasks.length;
  const subjPct=subjTotal?Math.round(subjDone/subjTotal*100):0;
  const progText=subjTotal?`${subjDone}/${subjTotal}`:'0 tasks';
  const labBadge=s.hasLab?`<span class="badge badge-lab">Theory+Lab</span>`:`<span class="badge badge-theory">Theory</span>`;
  return `
<div class="block${collapsed[s.id]?' collapsed':''}">
  <div class="block-header" onclick="toggleCol('${s.id}')">
    <div class="dot" style="background:${s.color}"></div>
    <div class="sname">${s.name}</div>
    ${labBadge}
    <div class="subj-bar-wrap"><div class="subj-bar-fill" style="width:${subjPct}%"></div></div>
    <div class="sprog">${progText}</div>
    <div class="arrow">&#9660;</div>
  </div>
  <div class="tasks" id="tl-${s.id}">
    ${s.subjTasks.length===0
      ?'<div class="empty">No tasks yet — add one below</div>'
      :s.subjTasks.map(t=>`
        <div class="task-row">
          <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" />
          <div class="task-main">
            <span class="task-lbl${t.done?' done':''}">${t.name}</span>
            <div class="task-meta">
              <span class="ttype ${TCLASS[t.type]||'t-assign'}">${t.type}</span>
              ${t.pri?`<span class="pri pri-${t.pri.toLowerCase()}">${t.pri}</span>`:''}
              ${t.due?`<span class="due-tag">Due: ${t.due}</span>`:''}
              ${t.note?`<span class="task-note">${t.note}</span>`:''}
            </div>
          </div>
          <button class="del-btn" onclick="deleteTask(${t.id})">&#10005;</button>
        </div>`).join('')}
  </div>
  <div class="add-row">
    <input type="text" id="inp-${s.id}" placeholder="Task name..." onkeydown="if(event.key==='Enter')doAdd('${s.id}')" />
    <select id="sel-ty-${s.id}">${TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    <select id="sel-pr-${s.id}">${PRIS.map(p=>`<option>${p}</option>`).join('')}</select>
    <input type="date" id="inp-du-${s.id}" />
    <input type="text" class="note-inp" id="inp-no-${s.id}" placeholder="Note..." />
    <button class="add-btn" onclick="doAdd('${s.id}')">+ Add</button>
  </div>
</div>`;}).join('')}

<div class="export-row">
  <button class="exp-btn" onclick="exportCSV()">Export CSV</button>
  <button class="exp-btn" onclick="exportJSON()">Backup JSON</button>
</div>
`;
}

function setFilter(f){filter=f;render();}
function toggleCol(id){collapsed[id]=!collapsed[id];render();}

render();
</script>
